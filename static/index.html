<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breaking News Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-mark">BND</span>
        <div>
          <h1>Breaking News Desk</h1>
          <p class="tagline">X video wire via mirrors · Primary sources first</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="status-pill" class="status-pill">Checking…</span>
        <button id="refresh-btn" class="btn btn-secondary" type="button">Refresh feed</button>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="news" role="tab" aria-selected="true">X video wire</button>
      <button class="tab" data-tab="editor" role="tab" aria-selected="false">Text tools</button>
    </nav>

    <main>
      <section id="panel-news" class="panel active" role="tabpanel">
        <div id="twitter-banner" class="twitter-banner" hidden></div>
        <div class="panel-toolbar">
          <label class="search-wrap">
            <span class="sr-only">Filter videos</span>
            <input id="news-filter" type="search" placeholder="Filter by headline, @handle, or keyword…" />
          </label>
          <select id="source-filter" aria-label="Filter by account">
            <option value="">All accounts</option>
            <option value="primary">Primary sources only</option>
          </select>
        </div>
        <div id="news-meta" class="meta-line"></div>
        <div id="news-grid" class="news-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </section>

      <section id="panel-editor" class="panel" role="tabpanel" hidden>
        <div class="editor-layout">
          <div class="editor-input">
            <label for="draft-text">Original text</label>
            <textarea id="draft-text" rows="14" placeholder="Paste your draft, notes, or transcript here…"></textarea>
            <div class="mode-toggle" role="radiogroup" aria-label="Transform mode">
              <label class="mode-option">
                <input type="radio" name="mode" value="headline" checked />
                <span>
                  <strong>Headline</strong>
                  <small>Brief overlay line</small>
                </span>
              </label>
              <label class="mode-option">
                <input type="radio" name="mode" value="shorten" />
                <span>
                  <strong>Shorten</strong>
                  <small>Trim length, keep facts</small>
                </span>
              </label>
              <label class="mode-option">
                <input type="radio" name="mode" value="rewrite" />
                <span>
                  <strong>Rewrite</strong>
                  <small>Fresh wording, same facts</small>
                </span>
              </label>
            </div>
            <button id="transform-btn" class="btn btn-primary" type="button">Transform text</button>
          </div>
          <div class="editor-output">
            <div class="output-header">
              <label for="result-text">Result</label>
              <button id="copy-btn" class="btn btn-ghost" type="button" disabled>Copy</button>
            </div>
            <textarea id="result-text" rows="14" readonly placeholder="Transformed text will appear here…"></textarea>
            <p id="transform-meta" class="meta-line"></p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <template id="card-template">
    <article class="card">
      <div class="card-thumb-wrap">
        <img class="card-thumb" alt="" loading="lazy" />
        <span class="card-source"></span>
      </div>
      <div class="card-body">
        <div class="card-badges"></div>
        <h2 class="card-title"></h2>
        <p class="card-desc"></p>
        <div class="card-stats"></div>
        <time class="card-time"></time>
        <div class="card-actions">
          <a class="btn btn-secondary card-open" target="_blank" rel="noopener noreferrer">Open video</a>
          <button class="btn btn-ghost card-download" type="button">Download</button>
        </div>
      </div>
    </article>
  </template>

  <script src="/app.js" type="module"></script>
</body>
</html>
